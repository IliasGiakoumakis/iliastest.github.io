    <style>
        :root {
            --bg-body: #f1f5f9; --bg-card: #ffffff; --text-main: #1e293b; --text-sub: #64748b;
            --primary: #2563eb; --accent: #dbeafe;
            --icon-github: #24292e; --icon-linkedin: #0077b5; --icon-gmail: #ea4335;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; --text-sub: #94a3b8;
            --primary: #38bdf8; --accent: #1e293b; --icon-github: #ffffff;
        }

        /* ΔΙΟΡΘΩΣΗ 1: Αφαιρέσαμε το flex από το body για να μην σπάει το animation */
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            transition: all 0.3s ease; 
            color: var(--text-main);
        }

        /* ΔΙΟΡΘΩΣΗ 2: Ρυθμίσεις για να κρύβεται το laptop και να δουλεύει το scroll */
        .real-website {
            background-color: var(--bg-body) !important;
            overflow-y: auto !important;
        }

        /* ΔΙΟΡΘΩΣΗ 3: Το παλιό σου "body" flex layout μεταφέρθηκε εδώ για να κρατήσει τη δομή των καρτών */
        .portfolio-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            width: 100%;
            position: relative;
            z-index: 10; /* Πάνω από το κύμα */
        }

        .controls { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .control-btn { background: var(--bg-card); border: 1px solid var(--text-sub); color: var(--text-main); padding: 10px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; font-weight: bold; }

        .section { background: var(--bg-card); padding: 2rem; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 600px; width: 90%; margin-bottom: 2rem; }

        .hero { text-align: center; }
        .profile-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 5px solid var(--bg-body); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.8rem; margin: 1rem 0 0.2rem; }
        .subtitle { color: var(--primary); font-weight: 600; margin-bottom: 1.5rem; }

        .social-links { display: flex; justify-content: center; gap: 1.2rem; margin-top: 1rem; align-items: center; }
        .social-links a { font-size: 1.8rem; transition: transform 0.2s; text-decoration: none; display: flex; align-items: center; }
        .social-links a:hover { transform: translateY(-3px); }
        .fa-github { color: var(--icon-github); }
        .fa-linkedin { color: var(--icon-linkedin); }
        .fa-envelope { color: var(--icon-gmail); }
        
        .csd-custom-icon { width: 35px; height: 35px; object-fit: contain; }

        h2 { font-size: 1.3rem; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 1.5rem; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 12px; border-bottom: 1px solid var(--accent); cursor: pointer; transition: background 0.2s; }
        .list-item:hover { background: var(--accent); }
        .tag { background: var(--primary); color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background-color: var(--bg-card); margin: 10% auto; padding: 2rem; border-radius: 24px; max-width: 500px; width: 85%; position: relative; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: var(--text-sub); }

        footer { margin: 2rem 0; font-size: 0.8rem; color: var(--text-sub); text-align: center; }
        
        #waveCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* ΔΙΟΡΘΩΣΗ 4: Το κάναμε 0 για να φαίνεται πάνω από το background του site, αλλά κάτω από τις κάρτες */
            pointer-events: none; 
        }

        /* Glassmorphism εφέ στις κάρτες */
        .section {
            background: rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        [data-theme="dark"] .section {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Εμφάνιση του Live Ρολογιού */
        .live-clock {
            position: absolute;
            top: 8%; /* Πόσο κάτω από την κορυφή θα είναι */
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            text-align: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6); /* Έντονη σκιά για να διαβάζεται τέλεια πάνω στη φωτογραφία */
            z-index: 5; /* Να είναι κάτω από το τελικό site, για να κρυφτεί μόλις κάνεις scroll */
            pointer-events: none; /* Να μην εμποδίζει τα κλικ */
        }
        .live-clock .time {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            display: flex; /* Μας βοηθάει να ευθυγραμμίσουμε τέλεια τα νούμερα με τα γράμματα */
            align-items: baseline; /* Κρατάει τα μικρά γράμματα στη βάση των αριθμών */
            justify-content: center;
        }
        
        /* ΑΥΤΟΣ ΕΙΝΑΙ Ο ΝΕΟΣ ΚΑΝΟΝΑΣ ΓΙΑ ΤΟ AM/PM */
        .live-clock .ampm {
            font-size: 1.5rem; /* Εδώ ρυθμίζεις πόσο μικρά θα είναι τα γράμματα! */
            font-weight: 400;
            margin-left: 8px; /* Απόσταση από τους αριθμούς */
            opacity: 0.8; /* Τα κάνει ελαφρώς πιο αχνά για πιο μοντέρνο στιλ */
        }
        
        .live-clock .date {
            font-size: 1.2rem;
            font-weight: 300;
            text-transform: capitalize;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>

                <script>
                    let currentLang = 'el';

                    const content = {
                        el: {
                            name: "Ηλίας Γιακουμάκης",
                            subtitle: "Προπτυχιακός Φοιτητής Επιστήμης Υπολογιστών @ ΠΚ",
                            aboutTitle: "Σχετικά με μένα",
                            aboutText: "Γεια! Είμαι ο Ηλίας, φοιτητής του τμήματος Επιστήμης Υπολογιστών (CSD) του Πανεπιστημίου Κρήτης στο Ηράκλειο της Κρήτης. Είμαι ανοιχτός για νέα project και νέες συνεργασίες. Με συναρπάζει ο χώρος της κυβερνοασφάλειας και των δικτύων και είναι κάτι το οποίο το ερευνώ αρκετά τελευταία. :). Αυτήν την περίοδο τρέχω πολλά project με φίλους και γνωστούς μου και αυτό με έχει βοηθήσει να αναπτύξω τις προγραμματιστικές μου δεξιότητες ακόμα και μέσα σε ομάδες. Συνεχίζω ωστόσο να κυνηγάω και την κυβερνοασφάλεια μέσω της πανεπιστημιακής ομάδας 0xdeada1u5.",
                            coursesTitle: "Μαθήματα",
                            certsTitle: "Πιστοποιήσεις & Σεμινάρια",
                            footer: "© 2026 Ηλίας Γιακουμάκης • CSD UOC",
                            langBtn: "EN",
                            tagText: "Πληροφορίες",
                            courses: [
                                { title: 'HY-100:Εισαγωγή στην Επιστήμη των Υπολογιστών', desc: 'Tο μάθημα αποτελεί μια εισαγωγή στην Επιστήμη των Υπολογιστών. Συγκεκριμένα, το μάθημα πραγματεύεται τα εξής θέματα: <br><ul><li>Μελέτη απλών υπολογιστικών προβλημάτων, αλγορίθμων που τα λύνουν και ανάλυση των λύσεων.</li><li>Μελέτη δομημένου και συναρτησιακού προγραμματισμού σε γλώσσα C, και ανάπτυξη διαφόρων προγραμμάτων βασισμένων στους παραπάνω αλγόριθμους.</li><li>Εκμάθηση διάφορων τύπων δεδομένων, οργάνωσης και αποθήκευσής τους στη μνήμη, καθώς και τρόπων διαχείρισης της μνήμης από το πρόγραμμα.</li>' },
                                { title: 'ΗΥ-108:Αγγλικά Ι', desc: 'Διαχείριση μνήμης και OOP.' },
                                { title: 'ΗΥ-110:Απειροστικός Λογισμός Ι', desc: 'Διαφορικές εξισώσεις και υπολογισμός ολοκληρωμάτων.' },
                                { title: 'ΗΥ-112:Φυσική Ι', desc: 'Ανάλυση κινήσεων, δυνάμεων, ενέργειας και ηλεκτρικών πεδίων.' },
                                { title: 'HY-119:Γραμμική Άλγεβρα', desc: 'Υπολογισμός πινάκων και Απαλοιφή Gauss.' },
                                { title: 'ΗΥ-120:Ψηφιακή Σχεδίαση', desc: 'Δημιουργία κυκλωμάτων και ενός απλού υπολογιστή.' }
                            ],
                            certs: [
                                { title: 'InnovaCyBridge', desc: 'Σεμινάρια για την Κυβερνοασφάλεια.',
                                children: [{ title: 'Strategic Cyber Security and AI Governance', /*desc: 'Intro to AI'*/ },{ title: 'Human-centric Security and Organisational Resilience', /*desc: 'Prompt Engineering'*/ },{ title: 'Effective Security Operations and Infrastructure Defence'}]},
                                { title: 'Web Development Intro', desc: 'Βασικές γνώσεις HTML/CSS.' }
                            ]
                        },
                        en: {
                            name: "Ilias Giakoumakis",
                            subtitle: "Computer Science Undergraduate @ UOC",
                            aboutTitle: "About Me",
                            aboutText: "Hi! I am Ilias, a student of the Computer Science Department (CSD) of the University of Crete in Heraklion, Crete. I am open to new projects and new collaborations. I am fascinated by the field of cybersecurity and networks and it is something that I have been researching quite a bit lately. :). I am currently running many projects with friends and acquaintances and this has helped me develop my programming skills even within teams. However, I also continue to pursue cybersecurity through the university team 0xdeada1u5.",
                            coursesTitle: "Courses",
                            certsTitle: "Certifications & Seminars",
                            footer: "© 2026 Ilias Giakoumakis • CSD UOC",
                            langBtn: "GR",
                            tagText: "Info",
                            courses: [
                                { title: 'CS-100:Introduction to Computer Science', desc: 'Core principles and architecture. <br>Grade: 10' },
                                { title: 'CS-108:English I', desc: 'Memory management and OOP.' },
                                { title: 'CS-110:Calculus I', desc: 'Differential equations and integrals.' },
                                { title: 'CS-112:Physics I', desc: 'Analysis of motion, forces, energy and electric fields.' },
                                { title: 'CS-119:Linear Algebra', desc: 'Matrix calculation and Gauss elimination.' },
                                { title: 'CS-120:Digital Design', desc: 'Creating circuits and a simple computer.' }
                            ],
                            certs: [
                                { title: 'InnovaCyBridge', desc: 'Seminar on Cybersecurity.',
                                children: [{ title: 'Strategic Cyber Security and AI Governance', /*desc: 'Intro to AI'*/ },{ title: 'Human-centric Security and Organisational Resilience', /*desc: 'Prompt Engineering'*/ },{ title: 'Effective Security Operations and Infrastructure Defence'}]},
                                { title: 'Web Development Intro', desc: 'Basic HTML/CSS knowledge.' }
                            ]
                        }
                    };

                    function updateUI() {
                        const data = content[currentLang];
                        document.getElementById('heroName').innerText = data.name;
                        document.getElementById('heroSubtitle').innerText = data.subtitle;
                        document.getElementById('aboutTitle').innerHTML = `<i class="fas fa-user"></i> ${data.aboutTitle}`;
                        document.getElementById('aboutText').innerText = data.aboutText;
                        document.getElementById('coursesTitle').innerHTML = `<i class="fas fa-graduation-cap"></i> ${data.coursesTitle}`;
                        document.getElementById('certsTitle').innerHTML = `<i class="fas fa-certificate"></i> ${data.certsTitle}`;
                        document.getElementById('footerText').innerText = data.footer;
                        document.getElementById('langBtn').innerText = data.langBtn;

                        // Render Lists
                        renderList('coursesList', data.courses, data.tagText);
                        renderList('certsList', data.certs, data.tagText);
                    }

                    function renderList(elementId, items, tagText) {
                        const list = document.getElementById(elementId);
                        list.innerHTML = '';
                        items.forEach(item => {
                           const div = document.createElement('div');
                            div.className = 'list-item';
                            div.onclick = () => openModal(item.title, item.desc);
                            div.innerHTML = `<span>${item.title}</span><span class="tag">${tagText}</span>`;
                            list.appendChild(div);
                        });
                    }

                    function toggleLanguage() {
                        currentLang = currentLang === 'el' ? 'en' : 'el';
                        updateUI();
                        updateClock();
                    }

                    function openModal(title, desc) {
                        document.getElementById('modalTitle').innerText = title;
                        document.getElementById('modalDescription').innerHTML = desc;
                        document.getElementById('infoModal').style.display = "block";
                    }
                    function closeModal() { document.getElementById('infoModal').style.display = "none"; }
                    window.onclick = (e) => { if(e.target == document.getElementById('infoModal')) closeModal(); }

                    function toggleTheme() {
                        const body = document.body;
                        const icon = document.getElementById('theme-icon');
                        if (body.getAttribute('data-theme') === 'dark') {
                            body.removeAttribute('data-theme');
                            icon.classList.replace('fa-sun', 'fa-moon');
                        } else {
                            body.setAttribute('data-theme', 'dark');
                            icon.classList.replace('fa-moon', 'fa-sun');
                        }
                    }

                    updateUI();
                    
                    // Canvas Animation Logic
                    const canvas = document.getElementById('waveCanvas');
                    const ctx = canvas.getContext('2d');

                    let particles = [];
                    const particleCount = 60; // Πόσες στήλες τελειών
                    const spacing = 40; // Απόσταση μεταξύ τους

                    function init() {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                        particles = [];
                        for (let i = 0; i < particleCount; i++) {
                            particles.push({
                                x: (i * (canvas.width / particleCount)) + 50,
                                y: canvas.height / 2,
                                baseY: canvas.height * 0.75, // Θέση στον άξονα Υ
                                angle: i * 0.2
                            });
                        }
                    }

                    function draw() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
    
                        const isDark = document.body.getAttribute('data-theme') === 'dark';
                        ctx.strokeStyle = isDark ? 'rgba(56, 189, 248, 0.3)' : 'rgba(37, 99, 235, 0.15)';
                        ctx.fillStyle = isDark ? 'rgba(56, 189, 248, 0.6)' : 'rgba(37, 99, 235, 0.4)';
                        ctx.lineWidth = 1;

                        ctx.beginPath();
                        for (let i = 0; i < particles.length; i++) {
                            let p = particles[i];
    
                            // Μαθηματική κίνηση με συνδυασμό Sin και Cos για φυσική ροή
                            p.y = p.baseY + Math.sin(p.angle) * 40 + Math.cos(p.angle * 0.5) * 20;
                            p.angle += 0.02; // Ταχύτητα κύματος

                            // Σχεδίαση της τελείας
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                            ctx.fill();

                            // Σύνδεση με την επόμενη τελεία (δημιουργία πλέγματος)
                            if (i > 0) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i-1].x, particles[i-1].y);
                                ctx.lineTo(p.x, p.y);
                                ctx.stroke();
                            }
    
                            // Προσθήκη κάθετων γραμμών που "σβήνουν" προς τα κάτω
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p.x, p.y + 100);
                            const gradient = ctx.createLinearGradient(0, p.y, 0, p.y + 100);
                            gradient.addColorStop(0, isDark ? 'rgba(56, 189, 248, 0.2)' : 'rgba(37, 99, 235, 0.1)');
                            gradient.addColorStop(1, 'transparent');
                            ctx.strokeStyle = gradient;
                            ctx.stroke();
                        }
    
                        requestAnimationFrame(draw);
                    }

                    window.addEventListener('resize', init);
                    init();
                    draw();
                    // --- Μηχανισμός Live Ρολογιού ---
                    function updateClock() {
                        const now = new Date();
                        const langCode = currentLang === 'el' ? 'el-GR' : 'en-US';
                        
                        // Το hour12: true αναγκάζει το ρολόι να δείχνει ΠΑΝΤΑ AM/PM ή π.μ./μ.μ.
                        let timeStr = now.toLocaleTimeString(langCode, { 
                            hour: '2-digit', 
                            minute: '2-digit', 
                            second: '2-digit', 
                            hour12: true 
                        });
                        
                        // ΜΑΓΙΚΟ ΚΟΛΠΟ: Βρίσκει τα γράμματα (AM/PM ή π.μ./μ.μ.) και τα τυλίγει στον κώδικα <span class="ampm">
                        timeStr = timeStr.replace(/([a-zA-Zα-ωΑ-Ω\.]+)/, '<span class="ampm">$1</span>');
                        
                        const dateStr = now.toLocaleDateString(langCode, { 
                            weekday: 'long', 
                            day: 'numeric', 
                            month: 'long', 
                            year: 'numeric' 
                        });
                        
                        document.getElementById('live-clock').innerHTML = `
                            <div class="time">${timeStr}</div>
                            <div class="date">${dateStr}</div>
                        `;
                    }
                    
                    setInterval(updateClock, 1000); // Ανανέωση κάθε 1 δευτερόλεπτο
                    updateClock(); // Τρέξτο αμέσως μόλις φορτώσει η σελίδα
                </script>
